name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests and compile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend tests
        env:
          PYTHONPYCACHEPREFIX: /tmp/image-translator-pycache
        run: pytest -q --cov=app --cov-report=term-missing:skip-covered

      - name: Compile backend
        env:
          PYTHONPYCACHEPREFIX: /tmp/image-translator-pycache
        run: python -m compileall app migrations

  frontend:
    name: Frontend typecheck, lint, tests, and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build
