services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/image_translator
      LOCAL_STORAGE_PATH: /app/data/storage
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data/storage:/app/data/storage
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/image_translator
      LOCAL_STORAGE_PATH: /app/data/storage
    volumes:
      - .:/app
      - ./data/storage:/app/data/storage
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: image_translator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:

