x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/image_translator
  CELERY_TASK_ALWAYS_EAGER: "true"
  LOCAL_STORAGE_PATH: /app/data/storage
  PUBLIC_BASE_URL: http://localhost:8000

x-backend-service: &backend-service
  image: image-translator-backend:local
  build:
    context: ./backend
  env_file:
    - ./backend/.env.example
  environment: *backend-env
  volumes:
    - ./backend:/app
    - ./backend/data/storage:/app/data/storage

services:
  migrate:
    <<: *backend-service
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *backend-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: node:25-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_MODE: http
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: image_translator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d image_translator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  frontend-node-modules:
